apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend
  namespace: frontend
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-page
  namespace: frontend
data:
  index.html: |
    <html>
    <body>
      <h1>shop-demo frontend</h1>
      <p>This workload is intentionally simplified for the course.</p>
      <p>Orders API: http://orders.orders.svc.cluster.local</p>
    </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
          env:
            - name: ORDERS_URL
              value: http://orders.orders.svc.cluster.local
          volumeMounts:
            - name: page
              mountPath: /usr/share/nginx/html
      volumes:
        - name: page
          configMap:
            name: frontend-page
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
