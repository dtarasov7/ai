data_dir: /var/lib/vector

api:
  enabled: true
  address: 127.0.0.1:8687

sources:
  minio_http:
    type: http_server
    address: 127.0.0.1:8686
    method: POST
    path: /
    strict_path: false
    path_key: http_path
    decoding:
      codec: json
    framing:
      method: bytes

transforms:
  route_minio_input:
    type: route
    inputs: ["minio_http"]
    reroute_unmatched: false
    route:
      server_logs: '.http_path == "/minio/server"'
      audit_logs: '.http_path == "/minio/audit"'

  normalize_minio_server:
    type: remap
    inputs: ["route_minio_input.server_logs"]
    source: |
      . = {
        "timestamp": .time,
        "service": "minio",
        "host": .host,
        "deployment_id": .deploymentid,
        "level": .level,
        "api_name": .api.name,
        "error_message": .error.message,
        "error_source": .error.source,
        "error_variables": .error.variables,
        "message": .message
      }

  normalize_minio_audit:
    type: remap
    inputs: ["route_minio_input.audit_logs"]
    source: |
      . = {
        "timestamp": .time,
        "service": "minio",
        "host": .host,
        "deployment_id": .deploymentid,

        "request_id": .requestID,
        "request_path": .requestPath,
        "request_host": .requestHost,
        "remote_ip": .remotehost,

        "user": .parentUser,
        "user_agent": .userAgent,

        "api_name": .api.name,
        "status": .api.status,
        "status_code": to_int(.api.statusCode) ?? null,

        "bucket": .api.bucket,
        "object": .api.object,

        "request_query": .requestQuery,
        "tags": .tags,

        "rx_bytes": to_int(.api.rx) ?? null,
        "tx_bytes": to_int(.api.tx) ?? null,
        "tx_headers_bytes": to_int(.api.txHeaders) ?? null,
        "ttfb_ns": to_int(.api.timeToFirstByteInNS) ?? null,
        "response_time_ns": to_int(.api.timeToResponseInNS) ?? null
      }

  derive_minio_api_errors:
    type: remap
    inputs: ["normalize_minio_audit"]
    source: |
      .is_api_error = false
      .error_class = null

      if is_integer(.status_code) {
        .is_api_error, err = .status_code >= 400
        if err != null {
          .is_api_error = false
        }

        is_5xx, err = .status_code >= 500
        if err == null && is_5xx == true {
          .error_class = "5xx"
        } else {
          is_4xx, err = .status_code >= 400
          if err == null && is_4xx == true {
            .error_class = "4xx"
          }
        }
      }

  route_minio_audit:
    type: route
    inputs: ["derive_minio_api_errors"]
    reroute_unmatched: false
    route:
      all_audit: 'true'
      api_errors: '.is_api_error == true'

  compact_minio_api_errors:
    type: remap
    inputs: ["route_minio_audit.api_errors"]
    source: |
      . = {
        "timestamp": .timestamp,
        "service": .service,
        "host": .host,
        "deployment_id": .deployment_id,

        "request_id": .request_id,
        "request_path": .request_path,
        "request_host": .request_host,
        "remote_ip": .remote_ip,

        "user": .user,
        "user_agent": .user_agent,

        "api_name": .api_name,
        "status": .status,
        "status_code": .status_code,
        "error_class": .error_class,

        "bucket": .bucket,
        "object": .object,
        "request_query": .request_query,
        "tags": .tags,

        "response_time_ns": .response_time_ns,
        "rx_bytes": .rx_bytes,
        "tx_bytes": .tx_bytes
      }

sinks:
  file_minio_server:
    type: file
    inputs: ["normalize_minio_server"]
    path: /var/log/vector/minio-server.jsonl
    encoding:
      codec: json

  file_minio_audit:
    type: file
    inputs: ["route_minio_audit.all_audit"]
    path: /var/log/vector/minio-audit.jsonl
    encoding:
      codec: json

  file_minio_api_errors:
    type: file
    inputs: ["compact_minio_api_errors"]
    path: /var/log/vector/minio-api-errors.jsonl
    encoding:
      codec: json
      